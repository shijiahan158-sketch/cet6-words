<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="六级单词 · 短语 · 语法 学习卡片" />
  <title>六级学习卡片 · 单词 / 短语 / 语法</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <h1>📘 六级学习卡片</h1>
    <p class="subtitle">单词 · 短语 · 语法 一站式记忆 · 点击 🔊 听美音</p>

    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search" type="search" placeholder="搜索单词、短语或释义…" autocomplete="off" />
        <button id="clear-search" class="clear-search" hidden title="清空">✕</button>
      </div>
    </div>

    <!-- 分类筛选 -->
    <nav class="filters">
      <div class="filter-group" id="filter-unit" data-key="unit" aria-label="按单元筛选"></div>
      <div class="filter-group" id="filter-type" data-key="type" aria-label="按类型筛选"></div>
      <div class="filter-group pos-group" id="filter-pos" data-key="pos" aria-label="按词性筛选"></div>
    </nav>

    <div class="stat-bar">
      <span id="count" class="count"></span>
    </div>
  </header>

  <main>
    <div id="cards" class="cards"></div>
    <p id="empty" class="empty" hidden>没有找到匹配的内容～</p>
  </main>

  <footer>
    <p>共 <span id="total"></span> 条 · 数据存放于 <code>words.js</code>，可随时扩展</p>
  </footer>

  <button id="to-top" class="to-top" hidden title="回到顶部">↑</button>

  <!-- 隐藏音频元素，用于播放有道发音 -->
  <audio id="player" preload="none"></audio>

  <script src="words.js"></script>
  <script src="script.js"></script>
</body>
</html>
